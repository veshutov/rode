[package]
name = "rode"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
anyhow = "1.0"
async-openai = "0.24.0"
dotenv = "0.15.0"
futures = "0.3"

[[bin]]
name = "claude-rust"
path = "src/main.rs"
